        let firebaseConfig;
        if (typeof __firebase_config !== 'undefined' && __firebase_config) {
            firebaseConfig = JSON.parse(__firebase_config);
        } else if (window.__firebase_config) {
            firebaseConfig = JSON.parse(window.__firebase_config);
        } else {
            firebaseConfig = {
                apiKey: "AIzaSyALCBfhcIjR5FHvVVEPCyfHJOsysrTM6kw", 
                authDomain: "bhs807.firebaseapp.com",
                projectId: "bhs807",
                storageBucket: "bhs807.firebasestorage.app",
                messagingSenderId: "703824622381",
                appId: "1:703824622381:web:b6c965897aed3a59cad9a4"
            };
        }

        let db = null;
        let auth = null;
        let isMockFallback = false;

        try {
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch (e) {
            console.warn("Fallo al conectar con Firebase en la nube. Usando base de datos local redundante.", e);
            isMockFallback = true;
        }

        window.F_SDK = {
            db, auth, isMockFallback, signInAnonymously, signInWithCustomToken, onAuthStateChanged,
            doc, collection, addDoc, setDoc, getDoc, updateDoc, deleteDoc, onSnapshot
        };

        if (window.mountReactApp) {
            window.mountReactApp();
        }

            const [newUserRole, setNewUserRole] = useState('vendedor');

            const newsFileInputRef = useRef(null);
            const newsCameraInputRef = useRef(null);
            const [newsPhoto, setNewsPhoto] = useState(''); // Contiene el Base64 de la foto de novedades

                setNotification({ show: true, message, type });
                setTimeout(() => {
                    setNotification(prev => ({ ...prev, show: false }));
                }, 4500);
            };

            useEffect(() => {
                if (currentUser) {
                    localStorage.setItem(`bauhaus_active_user_${appId}`, JSON.stringify(currentUser));
                } else {
                    localStorage.removeItem(`bauhaus_active_user_${appId}`);
                }
            }, [currentUser]);

            useEffect(() => {
                localStorage.setItem(`bauhaus_users_${appId}`, JSON.stringify(users));
            }, [users]);

            useEffect(() => {
                localStorage.setItem(`bauhaus_tasks_${appId}`, JSON.stringify(tasks));
            }, [tasks]);

                localStorage.setItem(`bauhaus_news_${appId}`, JSON.stringify(news));
            }, [news]);

            useEffect(() => {
                const handleResize = () => setIsMobile(window.innerWidth < 768);
                handleResize();
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            useEffect(() => {
                if (!auth) {
                    setConnectionStatus('offline');
                    setConnectionError('SDK de Firebase no inicializado en el cliente.');
                    setLoading(false);
                    return;
                }

                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }

                        setConnectionStatus('offline');
                        setFirebaseUser({ uid: "mock-user", isAnonymous: true });
                        setLoading(false);
                    }
                };
                initAuth();

                const unsubscribe = onAuthStateChanged(auth, (usr) => {
                    if (usr) setFirebaseUser(usr);
                });
                return () => unsubscribe();
            }, []);

                if (!firebaseUser || !db) {

                const usersCol = collection(db, 'artifacts', appId, 'public', 'data', 'users');
                const newsCol = collection(db, 'artifacts', appId, 'public', 'data', 'news');

                const unsubscribeTasks = onSnapshot(tasksCol, 
                    (snapshot) => {
                        const tasksData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        tasksData.sort((a, b) => {
                            const dateA = a.createdAt ? new Date(a.createdAt) : new Date(0);
                            const dateB = b.createdAt ? new Date(b.createdAt) : new Date(0);
                            return dateB - dateA;
                        });
                        setTasks(tasksData);
                        setConnectionStatus('online');
                        setConnectionError('');
                        setLoading(false);
                    },
                    (error) => {
                        setConnectionStatus('offline');
                        setConnectionError(`Error Firestore Tasks: ${error.message}`);
                        setLoading(false);
                    }
                );

                        const newsData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

                            const dateA = a.createdAt ? new Date(a.createdAt) : new Date(0);
                            const dateB = b.createdAt ? new Date(b.createdAt) : new Date(0);
                            return dateB - dateA;
                        });
                        setNews(newsData);
                    },
                    (error) => {
                        console.warn("Error Firestore News:", error);
                    }
                );

                const unsubscribeUsers = onSnapshot(usersCol,
                    (snapshot) => {
                        const usersData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

                            setUsers(usersData);

                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800;
                        const MAX_HEIGHT = 800;
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > MAX_WIDTH) {
                                height *= MAX_WIDTH / width;
                                width = MAX_WIDTH;
                            }
                        } else {
                            if (height > MAX_HEIGHT) {
                                width *= MAX_HEIGHT / height;
                                height = MAX_HEIGHT;
                            }
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
                        if (isNews) {
                            setNewsPhoto(compressedBase64);
                        } else {
                            setTaskPhoto(compressedBase64);
                        }

                    img.src = e.target.result;

                                {activeMobileTask.image && (
                                    <div className="py-3 flex justify-center bg-neutral-100 border-b-2 border-black">
                                        <img src={activeMobileTask.image} alt={activeMobileTask.title} className="max-h-48 object-contain" />
                                    </div>
                                )}

                                <div className="py-3 space-y-2.5 text-[10px] text-zinc-700 font-bold">
                                    <p className="uppercase"><span className="text-[#e30613] font-bauhaus text-[9px] mr-1">SECCIÓN:</span> {activeMobileTask.section}</p>
                                    <p className="uppercase"><span className="text-[#e30613] font-bauhaus text-[9px] mr-1">ESTADO:</span> {activeMobileTask.status}</p>
                                </div>
                                {activeMobileTask.status === 'completed' && activeMobileTask.finishedBy && (
                                    <div className="py-3 text-left space-y-2 border-t-2 border-black">
                                        <span className="text-[#e30613] font-bauhaus text-[9px] uppercase block mb-1">Datos de Finalización:</span>
                                        <p className="uppercase text-[9px] font-bold"><span className="text-zinc-500 mr-1">REALIZADA POR:</span> {activeMobileTask.finishedBy}</p>
                                        <p className="uppercase text-[9px] font-bold"><span className="text-zinc-500 mr-1">VENDEDOR:</span> {activeMobileTask.finishedVendedor}</p>
                                        <p className="uppercase text-[9px] font-bold"><span className="text-zinc-500 mr-1">FECHA FINALIZACIÓN:</span> {activeMobileTask.finishedAt}</p>
                                    </div>
                                )}
                                <div className="pt-3">
                                    <button onClick={() => setActiveMobileTask(null)} className="w-full bg-black text-white p-3 font-bauhaus text-[9px] uppercase border-2 border-black hover:bg-[#e30613] transition-colors font-bold">
                                        Volver
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Ficha técnica Modal de Novedades en Móvil */}
                    {activeMobileNews && (
                        <div className="fixed inset-0 bg-black/95 flex items-center justify-center p-4 z-50 animate-fade-in">
                            <div className="bg-white border-4 border-black p-6 w-full max-w-sm flex flex-col divide-y-2 divide-black max-h-[90vh] overflow-y-auto shadow-[10px_10px_0px_0px_rgba(0,0,0,1)]">
                                <div className="pb-3 text-left">
                                    <span className="text-[8px] bg-[#e30613] text-white px-2 py-0.5 font-bauhaus uppercase font-bold">{activeMobileNews.category}</span>
                                    <h4 className="font-bauhaus text-base mt-2 text-[#e30613] uppercase break-words">{activeMobileNews.title}</h4>
                                </div>

                                {activeMobileNews.image && (
                                    <div className="py-3 flex justify-center bg-neutral-100 border-b-2 border-black">
                                        <img src={activeMobileNews.image} alt={activeMobileNews.title} className="max-h-48 object-contain" />
                                    </div>
                                )}

                                <div className="py-3 space-y-2 text-[10px] text-zinc-700 font-bold">
                                    <p className="uppercase whitespace-pre-wrap font-medium text-black">{activeMobileNews.description}</p>
                                    <p className="uppercase text-[8px] text-zinc-400 mt-2">Publicado: {activeMobileNews.createdAt}</p>
                                    <p className="uppercase text-[8px] text-zinc-500">Autor: {activeMobileNews.author}</p>
                                </div>
                                <div className="pt-3">
                                    <button onClick={() => setActiveMobileNews(null)} className="w-full bg-black text-white p-3 font-bauhaus text-[9px] uppercase border-2 border-black hover:bg-[#e30613] transition-colors font-bold">
                                        Volver
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {confirmDelete && (
                        <div className="fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-50">
                            <div className="bg-white border-8 border-[#e30613] p-8 max-w-xs w-full text-center shadow-[15px_15px_0px_0px_rgba(0,0,0,1)]">
                                <h4 className="font-bauhaus text-lg uppercase mb-6 font-bold">¿Deseas eliminar esta tarea?</h4>
                                <button onClick={() => deleteTask(confirmDelete)} className="w-full bg-[#e30613] text-white p-4 font-bauhaus uppercase text-xs mb-2 font-bold shadow-[3px_3px_0px_0px_rgba(0,0,0,1)]">Eliminar Permanentemente</button>
                                <button onClick={() => setConfirmDelete(null)} className="w-full text-zinc-400 font-bauhaus uppercase text-[9px] py-2 hover:text-black">Cancelar</button>
                            </div>
                        </div>
                    )}

                    {confirmDeleteNews && (
                        <div className="fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-50">
                            <div className="bg-white border-8 border-[#e30613] p-8 max-w-xs w-full text-center shadow-[15px_15px_0px_0px_rgba(0,0,0,1)]">
                                <h4 className="font-bauhaus text-lg uppercase mb-6 font-bold">¿Deseas eliminar esta novedad?</h4>
                                <button onClick={() => deleteNews(confirmDeleteNews)} className="w-full bg-[#e30613] text-white p-4 font-bauhaus uppercase text-xs mb-2 font-bold shadow-[3px_3px_0px_0px_rgba(0,0,0,1)]">Eliminar Permanentemente</button>
                                <button onClick={() => setConfirmDeleteNews(null)} className="w-full text-zinc-400 font-bauhaus uppercase text-[9px] py-2 hover:text-black">Cancelar</button>
                            </div>
                        </div>
                    )}

                    {/* Modal para Creación de Usuarios Divididos por Roles (Solo Admin) */}
                    {isCreatingUser && (
                        <div className="fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-50">
                            <div className="bg-white border-4 border-black p-6 max-w-sm w-full shadow-[15px_15px_0px_0px_rgba(0,0,0,1)]">
                                <h4 className="font-bauhaus text-lg uppercase mb-6 font-bold">Nuevo Colaborador</h4>
                                <form className="space-y-4" onSubmit={e => {
                                    e.preventDefault();
                                    const fd = new FormData(e.target);
                                    const role = newUserRole;
                                    const userData = {
                                        name: fd.get('n'),
                                        role: role,
                                        position: role === 'direccion' ? 'DIRECCIÓN' : role === 'responsable' ? 'RESPONSABLE' : 'VENDEDOR'
                                    };
                                    // Sólo Dirección y Responsables tienen credenciales
                                    if (role === 'direccion' || role === 'responsable') {
                                        userData.username = fd.get('u');
                                        userData.password = fd.get('p');
                                    }
                                    addUser(userData);
                                    setNewUserRole('vendedor'); // Resetear al rol por defecto
                                }}>
                                    <div>
                                        <label className="font-bauhaus text-[9px] uppercase block mb-1">Rol Operativo</label>
                                        <select value={newUserRole} onChange={(e) => setNewUserRole(e.target.value)} className="w-full p-3 border-2 border-black text-xs uppercase font-bold bg-white focus:outline-none">
                                            <option value="direccion">Dirección</option>
                                            <option value="responsable">Responsable</option>
                                            <option value="vendedor">Vendedor</option>
                                        </select>
                                    </div>

                                    <div>
                                        <label className="font-bauhaus text-[9px] uppercase block mb-1">Nombre y Apellido</label>
                                        <input name="n" required className="w-full p-3 border-2 border-black font-bold text-xs focus:outline-none bg-white uppercase" placeholder="Ej. Juan Pérez" />
                                    </div>

                                    {(newUserRole === 'direccion' || newUserRole === 'responsable') && (
                                        <>
                                            <div>
                                                <label className="font-bauhaus text-[9px] uppercase block mb-1">Usuario de Acceso</label>
                                                <input name="u" required className="w-full p-3 border-2 border-black font-bold text-xs focus:outline-none bg-white" placeholder="Ej. juanp" />
                                            </div>
                                            <div>
                                                <label className="font-bauhaus text-[9px] uppercase block mb-1">Contraseña Inicial</label>
                                                <input name="p" type="password" required className="w-full p-3 border-2 border-black font-bold text-xs focus:outline-none bg-white" placeholder="••••••••" />
                                            </div>
                                        </>
                                    )}

                                    <div className="pt-2">
                                        <button type="submit" className="w-full bg-black text-white p-4 font-bauhaus uppercase text-xs border-2 border-black hover:bg-zinc-800 transition-colors font-bold shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                                            Registrar Colaborador
                                        </button>
                                        <button type="button" onClick={() => setIsCreatingUser(false)} className="w-full text-zinc-400 font-bauhaus uppercase text-[9px] py-4 hover:text-black text-center block font-bold">
                                            Cerrar Ventana
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const startApp = () => {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        };

        if (window.F_SDK) {
            startApp();
        } else {
            window.mountReactApp = startApp;
        }
    </script>
</body>
</html>
